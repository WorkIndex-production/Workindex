<div id="creditsHistory" class="page">
  <div style="display:flex;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10;">
    <button onclick="goBack()" style="width:36px;height:36px;border-radius:10px;border:1.5px solid var(--border);background:transparent;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-right:14px;">&larr;</button>
    <div>
      <h2 style="font-size:17px;font-weight:700;color:var(--text);margin:0;">Credits History</h2>
      <p style="font-size:12px;color:var(--text-muted);margin:0;">All purchases, spending, and ledger movement</p>
    </div>
  </div>

  <div style="max-width:820px;margin:0 auto;padding:24px 20px 60px;">
    <div style="background:linear-gradient(135deg,#FC8019,#e87010);border-radius:16px;padding:24px;margin-bottom:20px;text-align:center;">
      <div style="font-size:13px;font-weight:600;color:rgba(255,255,255,0.8);margin-bottom:6px;">Current Balance</div>
      <div style="font-size:48px;font-weight:800;color:#fff;" id="chBalanceDisplay">0</div>
      <div style="font-size:13px;color:rgba(255,255,255,0.8);margin-top:4px;">credits available</div>
      <button onclick="document.getElementById('creditModal').classList.add('open');" style="margin-top:16px;padding:10px 28px;background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.4);border-radius:20px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;">
        + Buy Credits
      </button>
    </div>

    <div style="display:flex;background:var(--bg-gray);border-radius:12px;padding:4px;margin-bottom:20px;">
      <button id="chTabPurchase" onclick="switchCreditsTab('purchase')" style="flex:1;padding:10px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;background:var(--primary);color:#fff;transition:all 0.2s;">Purchases</button>
      <button id="chTabSpent" onclick="switchCreditsTab('spent')" style="flex:1;padding:10px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;background:transparent;color:var(--text-muted);transition:all 0.2s;">Spent</button>
      <button id="chTabLedger" onclick="switchCreditsTab('ledger')" style="flex:1;padding:10px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;background:transparent;color:var(--text-muted);transition:all 0.2s;">Credit Ledger</button>
    </div>

    <div id="chPurchaseTab">
      <div id="chPurchaseList"><div style="text-align:center;padding:40px;"><div class="spinner"></div></div></div>
    </div>

    <div id="chSpentTab" style="display:none;">
      <div id="chSpentList"><div style="text-align:center;padding:40px;"><div class="spinner"></div></div></div>
    </div>

    <div id="chLedgerTab" style="display:none;">
      <div id="chLedgerList"><div style="text-align:center;padding:40px;"><div class="spinner"></div></div></div>
    </div>
  </div>
</div>
