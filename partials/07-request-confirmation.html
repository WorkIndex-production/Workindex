<div id="requestConfirmation" class="page">
  <div class="req-confirm-wrap">
    <div class="req-confirm-icon">🎉</div>
    <h2 class="req-confirm-title">Request Posted!</h2>
    <p class="req-confirm-sub">Your requirement has been shared with verified professionals. Expect responses within 24 hours.</p>

    <div class="req-confirm-card">
      <div class="req-confirm-card-row">
        <span>📋</span>
        <div>
          <div class="req-confirm-card-label">Service</div>
          <div class="req-confirm-card-value" id="confirmServiceName">ITR Filing</div>
        </div>
      </div>
      <div class="req-confirm-card-row">
        <span>👥</span>
        <div>
          <div class="req-confirm-card-label">Experts notified</div>
          <div class="req-confirm-card-value">Up to 5 verified professionals</div>
        </div>
      </div>
      <div class="req-confirm-card-row">
        <span>⏱️</span>
        <div>
          <div class="req-confirm-card-label">Expected response</div>
          <div class="req-confirm-card-value">Within 24 hours</div>
        </div>
      </div>
    </div>

    <button class="btn-primary" style="width:100%; max-width:360px; padding:16px; font-size:16px; font-weight:700; margin-bottom:12px;" onclick="showPage('clientDash'); loadClientData();">
      Go to My Dashboard →
    </button>
    <p style="font-size:13px; color:var(--text-muted);">Track responses in your Requests tab</p>
  </div>
</div>
