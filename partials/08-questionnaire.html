<div id="questionnaire" class="page">
  <!-- Blurred background overlay -->
  <div class="q-backdrop"></div>

  <!-- Modal card -->
  <div class="q-modal-card">

    <!-- Category Image Banner -->
    <div id="qCategoryBanner" style="display:none; height:160px; overflow:hidden; position:relative; flex-shrink:0;">
      <img id="qCategoryImg" src="" alt="" style="width:100%; height:100%; object-fit:cover; object-position:center;">
      <div style="position:absolute;inset:0;background:linear-gradient(to bottom, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.45) 100%);"></div>
      <div style="position:absolute;bottom:14px;left:18px;right:60px;">
        <div id="qCategoryLabel" style="font-size:18px;font-weight:800;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,0.4);"></div>
      </div>
      <!-- Exit button overlaid on image -->
      <button onclick="exitQuestionnaire()"
        style="position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.9);border:none;font-size:16px;cursor:pointer;color:#333;display:flex;align-items:center;justify-content:center;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,0.15);">✕</button>
    </div>

    <!-- Progress Header -->
    <div class="q-modal-header">
      <div id="qExitRow" style="display:flex; justify-content:flex-end; align-items:center; margin-bottom:12px;">
        <button onclick="exitQuestionnaire()"
          style="padding:5px 14px; border:1px solid var(--border); border-radius:20px; background:transparent; color:var(--text-muted); font-size:13px; font-weight:600; cursor:pointer;">
          ✕ Exit
        </button>
      </div>
      <!-- Progress bar only — no step counter -->
      <div style="height:4px; background:var(--border); border-radius:2px; overflow:hidden;">
        <div id="qProgressFill" style="width:0%; height:100%; background:var(--primary); transition:width 0.4s ease; border-radius:2px;"></div>
      </div>
    </div>
    
    <!-- Question Content -->
    <div id="qContent" class="q-modal-body"></div>

    <!-- Navigation Buttons -->
    <div class="q-modal-footer">
      <button id="qBackBtn" onclick="qBack()"
        style="display:none; flex:1; padding:14px; border:1.5px solid var(--border); border-radius:12px; background:transparent; color:var(--text); font-size:15px; font-weight:600; cursor:pointer; transition:all 0.2s;">
        ← Back
      </button>
      <button id="qNextBtn" onclick="qNext()"
        style="flex:2; padding:14px; border:none; border-radius:12px; background:var(--primary); color:#fff; font-size:15px; font-weight:700; cursor:pointer; opacity:0.5; transition:all 0.2s;" disabled>
        Continue
      </button>
    </div>

  </div>
</div>
